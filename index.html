<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Shake Game</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #fff5f7; padding: 50px; color: #333; }
        #count { font-size: 100px; color: #ff4081; margin: 20px 0; font-weight: bold; }
        .btn { padding: 18px 36px; font-size: 22px; background: #ff4081; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3); }
        .btn:active { transform: scale(0.95); }
        #status { color: #999; margin-top: 25px; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Shake to Win!</h1>
    <p>Shake your phone as fast as you can!</p>
    <div id="count">0</div>
    
    <button class="btn" onclick="startInference()">Join Game / Start Sensors</button>
    
    <div id="status">Waiting for activation...</div>

    <script>
        let score = 0;
        let isShaking = false;
        const threshold = 15; // Shake intensity threshold (Adjust based on testing)

        function startInference() {
            // Request iOS Permission
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                            document.getElementById('status').innerText = "Sensors Active! Start Shaking!";
                        }
                    })
                    .catch(console.error);
            } else {
                // Non-iOS or older devices
                window.addEventListener('devicemotion', handleMotion);
                document.getElementById('status').innerText = "Sensors Active!";
            }
        }

        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc) return;

            // Calculate total acceleration
            let totalAcc = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);

            if (totalAcc > threshold && !isShaking) {
                score++;
                isShaking = true;
                document.getElementById('count').innerText = score;
                
                // PLACEHOLDER: Firebase Write Logic
                // firebase.database().ref('players/' + userId).update({ score: score });

                // Small delay to prevent multiple counts per shake
                setTimeout(() => { isShaking = false; }, 100); 
            }
        }
    </script>
</body>
</html>
